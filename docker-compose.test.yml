services:
  postgres-test:
    image: postgres:16-alpine
    container_name: lensai-postgres-test
    environment:
      POSTGRES_USER: lensai_test
      POSTGRES_PASSWORD: lensai_test_password
      POSTGRES_DB: lensai_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lensai_test -d lensai_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # RAM'de çalışır, daha hızlı test

  redis-test:
    image: redis:7-alpine
    container_name: lensai-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data

  mongodb-test:
    image: mongo:7-jammy
    container_name: lensai-mongodb-test
    environment:
      MONGO_INITDB_ROOT_USERNAME: lensai_test
      MONGO_INITDB_ROOT_PASSWORD: lensai_test_password
      MONGO_INITDB_DATABASE: lensai_test
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data/db
