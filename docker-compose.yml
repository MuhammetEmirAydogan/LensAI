services:
  # ─────────────────────────────────────
  # POSTGRESQL — Ana Veritabanı
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lensai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lensai
      POSTGRES_PASSWORD: lensai_password
      POSTGRES_DB: lensai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lensai -d lensai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lensai-network

  # ─────────────────────────────────────
  # REDIS — Cache + Queue
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lensai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lensai-network

  # ─────────────────────────────────────
  # MONGODB — Video Metadata + AI Logs
  # ─────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: lensai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: lensai
      MONGO_INITDB_ROOT_PASSWORD: lensai_password
      MONGO_INITDB_DATABASE: lensai_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lensai-network

  # ─────────────────────────────────────
  # REDIS COMMANDER — Redis GUI (dev only)
  # http://localhost:8081
  # ─────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lensai-redis-gui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - lensai-network
    profiles:
      - tools

  # ─────────────────────────────────────
  # MONGO EXPRESS — MongoDB GUI (dev only)
  # http://localhost:8082
  # ─────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: lensai-mongo-gui
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: lensai
      ME_CONFIG_MONGODB_ADMINPASSWORD: lensai_password
      ME_CONFIG_MONGODB_URL: mongodb://lensai:lensai_password@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    ports:
      - "8082:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - lensai-network
    profiles:
      - tools

  # ─────────────────────────────────────
  # MAILHOG — Email testing (dev only)
  # SMTP: localhost:1025 | GUI: http://localhost:8025
  # ─────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: lensai-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - lensai-network
    profiles:
      - tools

  # ─────────────────────────────────────
  # MINIO — S3 Compatible Local Storage
  # API: 9000 | Console: 9001
  # ─────────────────────────────────────
  minio:
    image: minio/minio
    container_name: lensai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lensai-network

  # MinIO Client (mc) - Bucket oluşturmak için
  minio-init:
    image: minio/mc
    container_name: lensai-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/lensai-uploads || true;
      /usr/bin/mc anonymous set public myminio/lensai-uploads;
      exit 0;
      "
    networks:
      - lensai-network

volumes:
  postgres_data:
    name: lensai_postgres_data
  redis_data:
    name: lensai_redis_data
  mongodb_data:
    name: lensai_mongodb_data
  minio_data:
    name: lensai_minio_data

networks:
  lensai-network:
    name: lensai-network
    driver: bridge

  # ─────────────────────────────────────
